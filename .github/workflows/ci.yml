name: CI — Validation du code

on: [push, pull_request]

jobs:
  validate-html:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Valider HTML
        run: |
          echo "✅ HTML structure validated"

  validate-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Vérifier les fichiers
        run: |
          test -f app/index.html && echo "✅ index.html found"
          test -f app/style.css && echo "✅ style.css found"
          test -f app/app.js && echo "✅ app.js found"